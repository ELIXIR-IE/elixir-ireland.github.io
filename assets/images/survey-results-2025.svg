<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">Irish Life Science Data Infrastructure Survey - Q4 2025</title>
  <desc id="svgdesc">Survey results graphic for the Irish National Life Science Data Infrastructure Survey, Q4 2025, conducted by ELIXIR Ireland and VIBE.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#023452"/>
      <stop offset="100%" stop-color="#034a73"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f47920"/>
      <stop offset="100%" stop-color="#ff9f50"/>
    </linearGradient>
    <linearGradient id="barOrange" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f47920"/>
      <stop offset="100%" stop-color="#ff9f50"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0a5f8f"/>
      <stop offset="100%" stop-color="#1688c4"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle radial decoration -->
  <circle cx="1150" cy="80" r="140" fill="rgba(255,255,255,0.025)"/>
  <circle cx="1080" cy="600" r="110" fill="rgba(244,121,32,0.07)"/>
  <circle cx="60" cy="500" r="90" fill="rgba(255,255,255,0.025)"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#orangeGrad)"/>
  <!-- Bottom accent stripe -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#orangeGrad)"/>

  <!-- Bar chart (right side) -->
  <g transform="translate(830, 160)">
    <rect x="0"   y="140" width="42" height="100" rx="5" fill="url(#barBlue)"   opacity="0.85"/>
    <rect x="57"  y="90"  width="42" height="150" rx="5" fill="url(#barOrange)" opacity="0.85"/>
    <rect x="114" y="50"  width="42" height="190" rx="5" fill="url(#barBlue)"   opacity="0.85"/>
    <rect x="171" y="110" width="42" height="130" rx="5" fill="url(#barOrange)" opacity="0.85"/>
    <rect x="228" y="20"  width="42" height="220" rx="5" fill="url(#barBlue)"   opacity="0.85"/>
    <rect x="285" y="70"  width="42" height="170" rx="5" fill="url(#barOrange)" opacity="0.85"/>
    <!-- Baseline -->
    <line x1="-10" y1="240" x2="340" y2="240" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  </g>

  <!-- Respondents badge -->
  <circle cx="980" cy="500" r="74" fill="rgba(244,121,32,0.15)" stroke="#f47920" stroke-width="2"/>
  <text x="980" y="484" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#f47920">99</text>
  <text x="980" y="510" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="rgba(255,255,255,0.75)">researchers</text>
  <text x="980" y="530" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="rgba(255,255,255,0.75)">surveyed</text>

  <!-- Main heading -->
  <text x="80" y="155" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#ffffff" filter="url(#softShadow)">Irish Life Science Data</text>
  <text x="80" y="220" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#ffffff" filter="url(#softShadow)">Infrastructure Survey</text>

  <!-- Orange divider line -->
  <rect x="80" y="237" width="240" height="5" rx="2" fill="#f47920"/>

  <!-- Q4 2025 pill -->
  <rect x="80" y="255" width="160" height="38" rx="8" fill="rgba(244,121,32,0.22)" stroke="#f47920" stroke-width="1.5"/>
  <text x="160" y="279" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#f47920">Q4 2025</text>

  <!-- Subtitle lines -->
  <text x="80" y="340" font-family="Arial, Helvetica, sans-serif" font-size="23" fill="rgba(255,255,255,0.82)">National landscape analysis of Irish life science</text>
  <text x="80" y="370" font-family="Arial, Helvetica, sans-serif" font-size="23" fill="rgba(255,255,255,0.82)">data research infrastructure needs</text>

  <!-- Stats row -->
  <text x="80" y="430" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">99 researchers · ~515 represented · 12 capacity areas assessed</text>

  <!-- Community pills -->
  <rect x="80"  y="452" width="170" height="34" rx="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
  <text x="165" y="474" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#ffffff">ELIXIR Ireland</text>

  <rect x="264" y="452" width="88" height="34" rx="17" fill="rgba(244,121,32,0.18)" stroke="#f47920" stroke-width="1"/>
  <text x="308" y="474" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#f47920">VIBE</text>

  <!-- DOI -->
  <text x="80" y="555" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="rgba(255,255,255,0.42)">doi: 10.5281/zenodo.19673060</text>

  <!-- ELIXIR Ireland wordmark (bottom) -->
  <text x="80" y="592" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="rgba(255,255,255,0.55)">elixir-ireland.ie</text>
</svg>
