name: 📰 Submit News Item
description: Submit a news card or short linked news update for the ELIXIR Ireland website.
title: "[News]: "
labels: ["content:news"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting a news item.

        Use this form for a **news card** or a **short linked update** on the ELIXIR Ireland website.

        > For fuller news stories, editorial support, or anything beyond a short card with a read-more link, please contact **elixir@ul.ie** and **gavin.farrell@ul.ie**.

  - type: input
    id: title
    attributes:
      label: News title
      description: The headline that should appear on the card.
      placeholder: ELIXIR Ireland researchers contribute to major European publication
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Publication date
      description: Use format YYYY-MM-DD.
      placeholder: "2026-04-02"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: News type
      options:
        - Publication
        - Leadership update
        - Award or recognition
        - Community update
        - Training or resource
        - Event-related news
        - Other
    validations:
      required: true

  - type: input
    id: institution
    attributes:
      label: Relevant institute or organisation
      description: For example UCD, University of Galway, RCSI, UL, or ELIXIR Europe.
      placeholder: University College Dublin / ELIXIR Ireland
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Card summary
      description: Provide a concise 1–2 sentence summary for the news card.
      placeholder: Denis Shields and Raúl Fernández-Díaz are co-authors on a new Nature Methods paper on open and sustainable AI.
    validations:
      required: true

  - type: textarea
    id: people
    attributes:
      label: Key people to mention
      description: List names, affiliations, and any wording that should be included.
      placeholder: Denis Shields (UCD, ELIXIR Ireland); Raúl Fernández-Díaz (UCD, ELIXIR Ireland)

  - type: input
    id: read_more_link
    attributes:
      label: Read-more link
      description: External link or source page for the full story.
      placeholder: https://...
    validations:
      required: true

  - type: dropdown
    id: page_preference
    attributes:
      label: Preferred website output
      description: Tell us how this should appear on the website.
      options:
        - News card with external read-more link only
        - News card plus short internal ELIXIR Ireland page
        - Not sure, please advise
    validations:
      required: true

  - type: input
    id: image_url
    attributes:
      label: Image or logo
      description: Paste an image URL or note the image/logo to use on the card.
      placeholder: https://... or 'Use institution logo'

  - type: input
    id: image_alt
    attributes:
      label: Image alt text
      description: Short accessibility text describing the image.
      placeholder: Nature Methods logo

  - type: input
    id: contact_email
    attributes:
      label: Contact email
      description: Optional, in case we need clarification.
      placeholder: name@institution.ie

  - type: textarea
    id: extra_notes
    attributes:
      label: Additional notes
      description: Any deadlines, wording preferences, or other context.
