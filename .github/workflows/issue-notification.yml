name: Issue Email Notification

on:
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: gavin.farrell@ul.ie
          from: ELIXIR Ireland GitHub <${{ secrets.MAIL_USERNAME }}>
          subject: "[ELIXIR Ireland] New issue: ${{ github.event.issue.title }}"
          body: |
            A new issue has been submitted on the ELIXIR Ireland website repository.

            Title:    ${{ github.event.issue.title }}
            Opened by: ${{ github.event.issue.user.login }}
            URL:      ${{ github.event.issue.html_url }}

            --- Issue body ---

            ${{ github.event.issue.body }}

            ---
            Repository: ${{ github.repository }}
